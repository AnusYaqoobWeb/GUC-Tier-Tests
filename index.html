<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>GAMSTER TIER · GUC | BIG SQUARE IMAGES FOR TOP 3</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, .certificate-card, .certificate-card * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-smoothing: antialiased;
    }
    :root {
      --bg-deep: #0a0c12;
      --bg-card: #11161f;
      --bg-elevated: #161e2c;
      --accent-primary: #3b82f6;
      --border-subtle: #253041;
    }
    body { background: var(--bg-deep); color: #ffffff; overflow-x: hidden; }
    .gamster-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 28px; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.6); }
    
    /* ===== UNIFORM TIER BADGES — ENHANCED COLORS ===== */
    .tier-badge-base {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      width: auto;
      padding: 0.45rem 1rem;
      border-radius: 9999px;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.3px;
      text-align: center;
      white-space: nowrap;
      border-width: 1px;
      border-style: solid;
      transition: all 0.1s ease;
      backdrop-filter: blur(2px);
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    
    /* S+ TIER - MYTHIC PURPLE/GOLD */
    .tier-badge-Splus {
      background: linear-gradient(135deg, #9B30FF, #FFD700, #FF69B4) !important;
      color: white !important;
      border-color: #DA70D6 !important;
      box-shadow: 0 0 20px rgba(155, 48, 255, 0.6) !important;
      font-weight: 900 !important;
      text-shadow: 0 0 10px rgba(255,255,255,0.5) !important;
    }

    /* S TIER - LEGENDARY GOLD/RED */
    .tier-badge-S {
      background: linear-gradient(135deg, #FFD700, #FF8C00, #FF4500) !important;
      color: #1a1a2e !important;
      border-color: #FF6347 !important;
      box-shadow: 0 0 15px rgba(255, 69, 0, 0.5) !important;
      font-weight: 900 !important;
    }

    /* A+ TIER - PREMIUM GOLD */
    .tier-badge-Aplus {
      background: linear-gradient(135deg, #a18a06, #4b3002, #ff9717) !important;
      color: #1a1a2e !important;
      border-color: #FFB347 !important;
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.5) !important;
      font-weight: 800 !important;
    }
    
    /* A TIER - BLUE */
    .tier-badge-A {
      background:  linear-gradient(135deg, #ffffff, #4b3002, #000000) !important;
      color: white !important;
      border-color: #60a5fa !important;
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.4) !important;
    }
    
    /* A- TIER - DARK BLUE */
    .tier-badge-Aminus {
      background: linear-gradient(135deg, #ffae008f, #b40505, #ff9f0f) !important;
      color: #dbeafe !important;
      border-color: #3b82f6 !important;
    }
    
    /* B+ TIER - VIBRANT AMBER */
    .tier-badge-Bplus {
      background: linear-gradient(135deg, #87f031, #115704, #83a508) !important;
      color: #1e1b2e !important;
      border-color: #FCD34D !important;
      box-shadow: 0 0 12px rgba(251, 191, 36, 0.5) !important;
      font-weight: 800 !important;
    }
    
    /* B TIER - ORANGE */
    .tier-badge-B {
      background: linear-gradient(135deg, #3e9603, #04be4b) !important;
      color: white !important;
      border-color: #fb923c !important;
      box-shadow: 0 0 8px rgba(249, 115, 22, 0.3) !important;
    }
    
    /* B- TIER - DARK ORANGE */
    .tier-badge-Bminus {
      background: linear-gradient(135deg, #024616, #06af00) !important;
      color: #ffedd5 !important;
      border-color: #f97316 !important;
    }
    
    /* C+ TIER - HOT PINK GLOW */
    .tier-badge-Cplus {
      background: linear-gradient(135deg, #F472B6, #3b0420, #d60764) !important;
      color: white !important;
      border-color: #F9A8D4 !important;
      box-shadow: 0 0 12px rgba(236, 72, 153, 0.5) !important;
      font-weight: 800 !important;
      text-shadow: 0 0 8px rgba(255,255,255,0.3) !important;
    }
    
    /* C TIER - PURPLE */
    .tier-badge-C {
      background: linear-gradient(135deg, #1b0229, #2c0730) !important;
      color: #ede9fe !important;
      border-color: #a78bfa !important;
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.4) !important;
    }
    
    /* C- TIER - DARK PURPLE */
    .tier-badge-Cminus {
      background: linear-gradient(135deg, #e429b5, #300570) !important;
      color: #e9d5ff !important;
      border-color: #8b5cf6 !important;
    }
    
    /* D TIER - RED */
    .tier-badge-D {
      background: linear-gradient(135deg, #1b0101, #df0c0c) !important;
      color: white !important;
      border-color: #ef4444 !important;
      box-shadow: 0 0 8px rgba(220, 38, 38, 0.3) !important;
    }
    
    /* ===== TOP 3 PLAYER IMAGES - BIG SQUARE BOXES ===== */
    .top-player-skin {
      width: 140px !important;
      height: 140px !important;
      border-radius: 20px !important;
      object-fit: cover !important;
      border: 4px solid #3b82f6 !important;
      box-shadow: 0 0 25px rgba(59, 130, 246, 0.6) !important;
      background: linear-gradient(145deg, #1e2b4e, #0f172a) !important;
      margin: 0 auto 15px auto !important;
      transition: transform 0.3s ease, box-shadow 0.3s ease !important;
      display: block !important;
    }
    .top-player-skin:hover {
      transform: scale(1.03) !important;
      box-shadow: 0 0 35px rgba(59, 130, 246, 0.8) !important;
      border-color: #60a5fa !important;
    }
    
    /* Fallback for top players */
    .top-player-skin-fallback {
      width: 140px !important;
      height: 140px !important;
      border-radius: 20px !important;
      background: linear-gradient(145deg, #1e2b4e, #0f172a) !important;
      border: 4px solid #3b82f6 !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      margin: 0 auto 15px auto !important;
      font-size: 4rem !important;
      color: #60a5fa !important;
    }
    
    /* Regular player skin for table (smaller, circular) */
    .player-skin {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #3b82f6;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
      background: linear-gradient(145deg, #1e2b4e, #0f172a);
      margin: 0 auto 12px auto;
      transition: transform 0.2s ease;
    }
    
    td .tier-badge-base, .top-card .tier-badge-base { width: auto; min-width: 88px; }
    
    @keyframes slideUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.2, 0.9, 0.3, 1) forwards; }
    .sticky-header th { position: sticky; top: 0; background: var(--bg-elevated); z-index: 10; border-bottom: 1px solid var(--border-subtle); font-weight: 700; }
    .filter-btn { background: transparent; color: #9aa9c2; border: 1px solid transparent; transition: all 0.2s ease; font-weight: 600; border-radius: 14px; cursor: pointer; }
    .filter-btn.active { background: #3b82f6 !important; color: white !important; border-color: #3b82f6 !important; box-shadow: 0 6px 14px -4px #3b82f6; }
    .filter-btn:hover:not(.active) { background: #161e2c; color: white; border-color: #3b82f6; }
    input { background: #0f172a; border: 1px solid #2a3a55; color: white; border-radius: 18px; }
    input:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 2px #1e3a8a40; }
    .top-card { background: linear-gradient(145deg, #121a27, #0e1420); border: 1px solid #253041; border-radius: 32px; transition: all 0.25s ease; }
    .top-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
    .rank-number { background: #121e30; border: 1px solid #2e405b; border-radius: 40px; padding: 4px 16px; font-weight: 800; font-size: 0.85rem; }
    .screenshot-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; backdrop-filter: blur(20px); background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid #3b82f6; border-radius: 60px; padding: 14px 28px; display: flex; align-items: center; gap: 12px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(59,130,246,0.3); z-index: 2100; font-weight: 600; font-size: 0.95rem; color: white; opacity: 0; transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); pointer-events: none; }
    .screenshot-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .certificate-modal { position: fixed; inset: 0; background: rgba(5, 8, 14, 0.98); backdrop-filter: blur(16px); z-index: 1000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 1.5rem; padding: 1rem; }
    .certificate-modal.active { display: flex; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .certificate-card { width: 620px; max-width: 92vw; background: #0c0f16; border-radius: 48px; padding: 2rem 1.8rem; position: relative; overflow: hidden; border: 1px solid rgba(59, 130, 246, 0.5); box-shadow: 0 35px 55px -15px rgba(0,0,0,0.8); margin: 0 auto; backface-visibility: hidden; transform: translateZ(0); }
    .certificate-card::before { content: "◆ GUC OFFICIAL ◆"; position: absolute; bottom: 35px; right: -20px; font-size: 58px; font-weight: 900; color: rgba(59, 130, 246, 0.06); transform: rotate(-18deg); pointer-events: none; white-space: nowrap; font-family: monospace; }
    .certificate-card::after { content: "VERIFIED"; position: absolute; top: 18%; left: -25px; font-size: 70px; font-weight: 900; color: rgba(59, 165, 93, 0.03); transform: rotate(10deg); pointer-events: none; }
    .cert-player-name { font-size: 3rem; font-weight: 800; color: #FFFFFF; margin: 0.5rem 0 0.2rem; text-align: center; word-break: break-word; }
    .cert-tier { display: inline-block; background: linear-gradient(145deg, #202433, #0e111a); padding: 0.7rem 2rem; border-radius: 80px; font-size: 1.7rem; font-weight: 800; letter-spacing: 1px; color: #ffdf7e; border: 1px solid rgba(255, 200, 100, 0.7); margin: 1rem 0; }
    .cert-rank { background: #1a1f2c; display: inline-block; padding: 0.4rem 1.6rem; border-radius: 60px; color: #e2e8f0; font-weight: 700; font-size: 1rem; }
    .cert-tested { text-align: center; color: #9aaec9; font-size: 0.875rem; margin-top: 1rem; }
    .cert-footer-text { text-align: center; color: #5f6e8a; font-size: 11px; margin-top: 12px; padding-top: 8px; border-top: 1px dashed #2a3448; }
    .cert-meta-row { display: flex; justify-content: space-between; font-size: 0.65rem; color: #5b6b8c; margin-top: 12px; flex-wrap: wrap; gap: 8px; }
    .cert-action-btn { background: #252b39; border: none; padding: 0.75rem 1.5rem; border-radius: 60px; font-weight: 600; color: white; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 10px; font-size: 0.9rem; }
    .cert-action-btn.screenshot-btn { background: #3b82f6; }
    .cert-action-btn.close-cert { background: #2d1f2a; border: 1px solid #f87171; color: #fecaca; }
    .back-to-top { background: #1a2538; border: 1px solid #3b82f6; width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
    .back-to-top:hover { background: #2d3a52; transform: scale(1.05); }
    tr { transition: background 0.15s; cursor: pointer; }
    tr:hover { background: #1a2538 !important; }
    .guc-nav { background: rgba(7, 11, 20, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(59, 130, 246, 0.25); }
    
    /* Enhanced Mobile Responsiveness */
    @media (max-width: 768px) {
      .guc-nav { padding: 0.75rem 1rem; }
      .guc-nav .font-extrabold { font-size: 1rem; }
      .gamster-card { padding: 1.25rem !important; }
      h1 { font-size: 1.5rem !important; }
      .filter-btn { padding: 0.5rem 0.75rem !important; font-size: 0.7rem !important; }
      .top-player-skin { width: 120px !important; height: 120px !important; }
      table { font-size: 0.8rem; }
      th, td { padding: 0.75rem 0.5rem !important; }
      .rank-number { padding: 2px 8px; font-size: 0.7rem; }
    }
    
    @media (max-width: 640px) {
      .certificate-card { padding: 1.5rem 1.2rem; }
      .cert-player-name { font-size: 2rem; }
      .cert-tier { font-size: 1.2rem; padding: 0.5rem 1.2rem; }
      .tier-badge-base { min-width: 80px; font-size: 0.75rem; padding: 0.35rem 0.75rem; }
      .top-player-skin { width: 100px !important; height: 100px !important; border-radius: 16px !important; }
      .top-player-skin-fallback { width: 100px !important; height: 100px !important; font-size: 3rem !important; }
      #topPlayersGrid { gap: 1rem; }
      .top-card { padding: 1rem !important; }
      .top-card .text-2xl { font-size: 1.25rem !important; }
    }
    
    @media (max-width: 480px) {
      .guc-nav { flex-direction: column; gap: 0.5rem; }
      .filter-btn { padding: 0.4rem 0.6rem !important; font-size: 0.65rem !important; }
      #searchInput { padding: 0.75rem 2.5rem !important; font-size: 0.85rem; }
      .top-player-skin { width: 80px !important; height: 80px !important; }
      .cert-action-btn { padding: 0.5rem 1rem; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="guc-nav fixed top-0 left-0 w-full z-50 py-3 px-5 shadow-lg">
    <div class="max-w-7xl mx-auto flex items-center justify-between flex-wrap gap-3">
      <div class="flex items-center gap-3">
        <img src="/assets/gamster8years.webp" alt="Logo" class="w-9 h-9 rounded-xl border border-[#3b82f6]/70 object-cover bg-gradient-to-br from-[#1e3a8a] to-[#0f172a] shadow-md">
        <div class="font-extrabold text-xl tracking-tight bg-gradient-to-r from-white to-blue-300 bg-clip-text text-transparent">GAMSTER<span class="text-blue-400">TIER</span></div>
        <div class="hidden sm:flex text-xs bg-[#1e2b4e] px-3 py-1.5 rounded-full text-blue-200 border border-[#3b82f6]/50"><i class="fas fa-shield-alt mr-1"></i> GUC · OFFICIAL</div>
      </div>
      <div class="flex gap-3 text-sm">
        <div class="bg-[#0f172a]/80 px-4 py-1.5 rounded-full backdrop-blur-sm border border-[#2e405b]">
          <i class="fas fa-trophy text-yellow-500 mr-2"></i><span id="totalPlayersNav">0</span> Tested
        </div>
      </div>
    </div>
  </div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-12 relative z-10">
    <div class="gamster-card rounded-3xl p-6 sm:p-8 mb-8 animate-slide-up">
      <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-5">
        <div>
          <h1 class="text-3xl sm:text-4xl font-black tracking-tight text-white flex items-center gap-3">
            <img src="/assets/Sleek _GUC_ logo with colorful swoosh.png" alt="Logo" class="w-10 h-10 rounded-xl border border-[#3b82f6]/60 object-cover">
            <span>Tier Tests <span class="text-blue-400">Leaderboard</span></span>
          </h1>
          <p class="text-[#9aaec9] mt-2"><i class="fas fa-chart-line text-blue-500 mr-2"></i> Global ranking · Color Coded Tier System</p>
        </div>
        <div class="bg-[#0f1a2b] px-5 py-2.5 rounded-2xl border border-[#2e405b]">
          <i class="fas fa-users text-[#3b82f6] mr-2"></i>
          <span class="font-bold text-white" id="totalPlayers">0 Players</span>
        </div>
      </div>
    </div>

    <div class="flex flex-col md:flex-row gap-4 items-stretch md:items-center justify-between mb-9">
      <div class="relative w-full md:w-96">
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-[#6b8cbe]"></i>
        <input type="text" id="searchInput" placeholder="🔍 Search by IGN ..." class="w-full bg-[#0f172a] border border-[#2e405b] rounded-2xl py-3.5 px-12 text-white focus:border-[#3b82f6] transition-all">
        <button id="clearSearch" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#8ba3c9] hover:text-white hidden"><i class="fas fa-times-circle"></i></button>

      <div class="flex flex-wrap gap-2">
        <div class="flex bg-[#0f172a]/80 p-1.5 rounded-2xl border border-[#2a3a55] flex-wrap">

          <button data-filter="B" class="filter-btn px-5 py-2 rounded-xl text-sm font-bold">B</button>

    <div class="mb-12">

    </div>

<script>
(function(){
  // ========== PLAYER DATA ==========
  const PLAYERS = [
    { ign: "Zonqie", tester: "432", tier: "C-" },
  { ign: "dimonking", tester: "432_", tier: "D" },
  { ign: "ZerotTick", tester: "432_", tier: "A" },
  { ign: "raifonly", tester: "432", tier: "A" },
  { ign: "_ZestTapxD", tester: "432", tier: "B" },
  { ign: "Swmkf", tester: "432", tier: "A" },
  { ign: "Zhadow3", tester: "432", tier: "B-" },
  { ign: "Sgnatures_", tester: "432", tier: "A-" },
  { ign: "KitsuneKraze", tester: "432", tier: "A-" },
  { ign: "MinoTotoro", tester: "oth0098", tier: "A-" }
  ];
  
  // Fixed tier ranking order - proper hierarchy from highest to lowest
  const tierRank = {
    'S+': 0,
    'S': 1,
    'A+': 2,
    'A': 3,
    'A-': 4,
    'B+': 5,
    'B': 6,
    'B-': 7,
    'C+': 8,
    'C': 9,
    'C-': 10,
    'D': 11
  };
  
  function getGlobalRanked() {
    return [...PLAYERS].sort((a,b) => {
      let rankA = tierRank[a.tier] !== undefined ? tierRank[a.tier] : 99;
      let rankB = tierRank[b.tier] !== undefined ? tierRank[b.tier] : 99;
      if(rankA !== rankB) return rankA - rankB;
      return a.ign.localeCompare(b.ign);
    });
  }
  
  function getPlayerRank(ign) { 
    const ranked = getGlobalRanked(); 
    const idx = ranked.findIndex(p => p.ign === ign); 
    return idx !== -1 ? idx+1 : null; 
  }
  
  function escapeHtml(str) { 
    if(!str) return ''; 
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); 
  }
  
  function getTierBadge(tier) {
    let badgeClass = '';
    switch(tier) {
      case 'S+': badgeClass = 'tier-badge-Splus'; break;
      case 'S': badgeClass = 'tier-badge-S'; break;
      case 'A+': badgeClass = 'tier-badge-Aplus'; break;
      case 'A': badgeClass = 'tier-badge-A'; break;
      case 'A-': badgeClass = 'tier-badge-Aminus'; break;
      case 'B+': badgeClass = 'tier-badge-Bplus'; break;
      case 'B': badgeClass = 'tier-badge-B'; break;
      case 'B-': badgeClass = 'tier-badge-Bminus'; break;
      case 'C+': badgeClass = 'tier-badge-Cplus'; break;
      case 'C': badgeClass = 'tier-badge-C'; break;
      case 'C-': badgeClass = 'tier-badge-Cminus'; break;
      case 'D': badgeClass = 'tier-badge-D'; break;
      default: badgeClass = 'tier-badge-D';
    }
    return `<span class="tier-badge-base ${badgeClass}">TIER ${tier}</span>`;
  }
  
  // BIG SQUARE IMAGE FOR TOP 3 PLAYERS
  function getTopPlayerSkinImage(ign) {
    const skins = { "raifonly": "/skins/catbrine.png", "Swmkf": "/skins/devil.png", "ZerotTick": "/skins/oo.png" };
    const skinPath = skins[ign] || `/skins/default.png`;
    return `<img src="${skinPath}" alt="${ign}" class="top-player-skin" onerror="this.onerror=null; this.src='/skins/default.png';">`;
  }
  
  // Normal circular image for table
  function getPlayerSkinImage(ign) {
    const skins = { "Catbrine": "/skins/catbrine.png", "IamNotDevilMC": "/skins/devil.png", "Myxi": "/skins/oo.png" };
    const skinPath = skins[ign] || `/skins/default.png`;
    return `<img src="${skinPath}" alt="${ign}" class="player-skin" onerror="this.onerror=null; this.src='/skins/default.png';">`;
  }
  
  function generateCertId(ign) { 
    const rand = Math.random().toString(36).substring(2,8).toUpperCase(); 
    const time = Date.now().toString(36).slice(-4); 
    return `GUC-${ign.substring(0,3).toUpperCase()}-${rand}${time}`; 
  }
  
  function getTimestamp() { 
    const now = new Date(); 
    return now.toLocaleString('en-US', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' }); 
  }
  
  function showScreenshotToast() {
    const existingToast = document.querySelector('.screenshot-toast');
    if(existingToast) existingToast.remove();
    const toast = document.createElement('div');
    toast.className = 'screenshot-toast';
    toast.innerHTML = `<i class="fas fa-camera-retro"></i><span>📸 Screenshot manually (PrtSc / mobile screenshot)</span><i class="fas fa-mobile-alt text-blue-300"></i>`;
    document.body.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
  }
  
  function buildCertificateHTML(player, rank, certId, ts) {
    return `<div class="certificate-card" id="certificateInner">
      <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem;"><div style="background: #1a1f2e; padding: 6px 16px; border-radius: 999px; font-size: 11px; font-weight: 700;"><i class="fas fa-gamepad" style="margin-right: 4px; color: #60a5fa;"></i> GUC | COMPETITIVE</div><div style="background: rgba(59,165,93,0.12); border: 1px solid #3ba55d; border-radius: 999px; padding: 6px 12px; font-size: 11px; font-weight: 700; color: #6fcf97;"><i class="fas fa-check-circle"></i> VERIFIED OFFICIAL</div></div>
      <div class="cert-player-name">${escapeHtml(player.ign)}</div>
      <div style="text-align: center; margin: 8px 0;"><div class="cert-tier">🏅 TIER ${escapeHtml(player.tier)}</div></div>
      <div style="text-align: center; margin-top: 4px;"><span class="cert-rank"><i class="fas fa-hashtag"></i> GLOBAL RANK #${rank}</span></div>
      <div class="cert-tested">📋 Tested by ${escapeHtml(player.tester)} • Official GUC System</div>
      <div class="cert-footer-text">Official Tier Test Certificate – Gamster Tier Tests</div>
      <div class="cert-meta-row"><span>🆔 ID: ${certId}</span><span>📅 ${ts}</span></div>
    </div>`;
  }
  
  function showCertificateModal(player) {
    const rank = getPlayerRank(player.ign);
    if(!rank) return;
    const certId = generateCertId(player.ign);
    const ts = getTimestamp();
    document.getElementById('certificateContainer').innerHTML = buildCertificateHTML(player, rank, certId, ts);
    document.getElementById('certificateModal').classList.add('active');
  }
  
  document.getElementById('screenshotGuideBtn').addEventListener('click', showScreenshotToast);
  document.getElementById('closeCertModal').addEventListener('click',()=> document.getElementById('certificateModal').classList.remove('active'));
  document.getElementById('certificateModal').addEventListener('click',(e)=>{ if(e.target === document.getElementById('certificateModal')) document.getElementById('certificateModal').classList.remove('active'); });
  
  let currentFilter = 'all';
  let currentSort = { field: 'rank', asc: true };
  let searchTerm = '';
  let displayLimit = 10;
  
  function filterAndSortPlayers() {
    let filtered = PLAYERS.filter(p => {
      if(currentFilter === 'all') return true;
      if(currentFilter === 'S') return p.tier === 'S' || p.tier === 'S+';
      return p.tier.startsWith(currentFilter);
    }).filter(p => p.ign.toLowerCase().includes(searchTerm.toLowerCase()));
    
    return [...filtered].sort((a,b) => {
      if(currentSort.field === 'tier') { 
        let val = (tierRank[a.tier]||99) - (tierRank[b.tier]||99); 
        return currentSort.asc ? val : -val; 
      }
      if(currentSort.field === 'ign') return currentSort.asc ? a.ign.localeCompare(b.ign) : b.ign.localeCompare(a.ign);
      if(currentSort.field === 'tester') return currentSort.asc ? a.tester.localeCompare(b.tester) : b.tester.localeCompare(a.tester);
      const rankA = getPlayerRank(a.ign), rankB = getPlayerRank(b.ign);
      return currentSort.asc ? rankA - rankB : rankB - rankA;
    });
  }
  
  function renderTop() {
    const top3 = getGlobalRanked().slice(0,3);
    const medals = ['🥇','🥈','🥉'];
    document.getElementById('topPlayersGrid').innerHTML = top3.map((p,i)=>`
      <div class="top-card p-5 animate-slide-up cursor-pointer" style="animation-delay:${i*0.08}s">
        <div class="flex justify-between items-start"><span class="text-3xl">${medals[i]}</span><span class="w-10 h-10 rounded-full flex items-center justify-center font-extrabold bg-[#1e2a3a]">#${i+1}</span></div>
        <div style="display:flex; justify-content:center; margin: 10px 0;">${getTopPlayerSkinImage(p.ign)}</div>
        <div class="text-2xl font-black text-white mt-2 text-center">${escapeHtml(p.ign)}</div>
        <div class="my-3 text-center">${getTierBadge(p.tier)}</div>
        <div class="text-sm text-[#b8c7f0] text-center"><i class="fas fa-id-card mr-1 text-blue-400"></i>${escapeHtml(p.tester)}</div>
        <button data-ign="${escapeHtml(p.ign)}" data-tier="${p.tier}" data-tester="${escapeHtml(p.tester)}" class="cert-trigger mt-4 w-full bg-[#1e2e4a] hover:bg-[#2f4060] py-2.5 rounded-xl text-sm font-bold transition flex items-center justify-center gap-2"><i class="fas fa-certificate text-blue-300"></i> Get Certificate</button>
      </div>
    `).join('');
    attachCertTriggers();
  }
  
  function renderTable() {
    const filtered = filterAndSortPlayers();
    document.getElementById('totalPlayers').innerText = PLAYERS.length;
    document.getElementById('totalPlayersNav').innerText = PLAYERS.length;
    const disp = filtered.slice(0, displayLimit);
    const hasMore = filtered.length > displayLimit;
    const tbody = document.getElementById('tableBody');
    if(disp.length===0){ 
      tbody.innerHTML='<tr><td colspan="5" class="p-8 text-center text-[#8f9ec2]">No players found</td></tr>'; 
      document.getElementById('paginationInfo').innerText='0 players'; 
      document.getElementById('showMoreBtn').classList.add('hidden'); 
      return; 
    }
    let html = '';
    disp.forEach(p => {
      const rank = getPlayerRank(p.ign);
      html += `<tr class="hover:bg-[#1e2e4a]/80 transition"><td class="p-4"><span class="rank-number">#${rank}</span></td><td class="p-4 font-bold flex items-center gap-2"><i class="fas fa-gamepad text-blue-500"></i>${escapeHtml(p.ign)}</td><td class="p-4 text-[#cbd9ff]"><i class="fas fa-user-check mr-1 text-blue-400"></i>${escapeHtml(p.tester)}</td><td class="p-4">${getTierBadge(p.tier)}</td><td class="p-4 text-center"><button data-ign="${escapeHtml(p.ign)}" data-tier="${p.tier}" data-tester="${escapeHtml(p.tester)}" class="cert-trigger text-[#98b2f0] hover:text-white text-xl transition"><i class="fas fa-certificate"></i></button></td></tr>`;
    });
    tbody.innerHTML = html;
    document.getElementById('paginationInfo').innerText = `Showing ${disp.length} of ${filtered.length} player${filtered.length!==1?'s':''}`;
    const moreBtn = document.getElementById('showMoreBtn');
    if(hasMore && searchTerm === '') moreBtn.classList.remove('hidden');
    else moreBtn.classList.add('hidden');
    attachCertTriggers();
  }
  
  function renderSearchCard() {
    const container = document.getElementById('playerCardContainer');
    if(!searchTerm.trim()) { container.classList.add('hidden'); return; }
    const filtered = filterAndSortPlayers();
    const exact = PLAYERS.find(p=>p.ign.toLowerCase()===searchTerm.toLowerCase()) || filtered[0];
    if(!exact) { 
      container.innerHTML=`<div class="gamster-card p-8 text-center"><i class="fas fa-user-slash text-4xl mb-2"></i><p>No result</p></div>`; 
      container.classList.remove('hidden'); 
      return; 
    }
    container.innerHTML = `<div class="gamster-card p-6 border-l-4 border-[#3b82f6]"><div class="flex flex-col items-center gap-3"><div class="w-20 h-20 rounded-full bg-gradient-to-b from-[#1e2b4e] to-[#0b1120] flex items-center justify-center border-2 border-blue-500"><i class="fas fa-user text-3xl text-blue-300"></i></div><h3 class="text-3xl font-black">${escapeHtml(exact.ign)}</h3>${getTierBadge(exact.tier)}<p class="text-[#b9c8ff]"><i class="fas fa-user-check mr-1"></i>Tester: ${escapeHtml(exact.tester)}</p><button data-ign="${escapeHtml(exact.ign)}" data-tier="${exact.tier}" data-tester="${exact.tester}" class="cert-trigger bg-blue-600 hover:bg-blue-700 px-6 py-2.5 rounded-xl font-bold flex gap-2"><i class="fas fa-certificate"></i> Get Certificate</button></div></div>`;
    container.classList.remove('hidden');
    attachCertTriggers();
  }
  
  function attachCertTriggers() {
    document.querySelectorAll('.cert-trigger').forEach(btn => {
      btn.removeEventListener('click', certHandler);
      btn.addEventListener('click', certHandler);
    });
  }
  
  function certHandler(e) {
    const btn = e.currentTarget;
    const ign = btn.getAttribute('data-ign');
    const tier = btn.getAttribute('data-tier');
    const tester = btn.getAttribute('data-tester');
    const player = PLAYERS.find(p=>p.ign===ign) || { ign, tier, tester };
    showCertificateModal(player);
  }
  
  function updateAll() { renderTable(); renderTop(); renderSearchCard(); }
  
  document.getElementById('searchInput').addEventListener('input', (e) => { 
    searchTerm = e.target.value; 
    displayLimit=10; 
    document.getElementById('clearSearch').classList.toggle('hidden', !searchTerm); 
    updateAll(); 
  });
  
  document.getElementById('clearSearch').addEventListener('click', () => { 
    document.getElementById('searchInput').value=''; 
    searchTerm=''; 
    displayLimit=10; 
    document.getElementById('clearSearch').classList.add('hidden'); 
    updateAll(); 
  });
  
  document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => { 
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); 
    btn.classList.add('active'); 
    currentFilter = btn.getAttribute('data-filter'); 
    displayLimit=10; 
    updateAll(); 
  }));
  
  document.querySelectorAll('[data-sort]').forEach(th => th.addEventListener('click', () => { 
    const field = th.getAttribute('data-sort'); 
    currentSort = { field, asc: currentSort.field===field ? !currentSort.asc : true }; 
    updateAll(); 
  }));
  
  document.getElementById('showMoreBtn').addEventListener('click', () => { displayLimit += 10; updateAll(); });
  
  window.addEventListener('scroll', () => { 
    const btn=document.getElementById('backToTop'); 
    if(window.scrollY>300) { btn.style.opacity='1'; btn.style.visibility='visible'; } 
    else { btn.style.opacity='0'; btn.style.visibility='hidden'; } 
  });
  
  document.getElementById('backToTop').addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));
  
  updateAll();
})();
</script>
</body>
</html>
